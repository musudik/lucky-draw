<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Lucky Draw - Dynamic Wheel</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2d3748 0%, #1a202c 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1/1;
            margin: 0 auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #fff;
            clip-path: polygon(100% 0, 50% 100%, 0 0);
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .winner-item {
            animation: slideIn 0.5s ease-out forwards;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #fbbf24;
        }

        .confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 999;
        }

        /* Toggle Switch Styles */
        .toggle-track {
            transition: background-color 0.3s;
        }
        .toggle-thumb {
            transition: transform 0.3s;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Confetti Hook ---
        const useConfetti = () => {
            const canvasRef = useRef(null);
            const particlesRef = useRef([]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);
                return () => window.removeEventListener('resize', resize);
            }, []);

            const fire = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const colors = ['#fcd34d', '#f87171', '#60a5fa', '#34d399', '#a78bfa'];
                for(let i=0; i<200; i++) {
                    particlesRef.current.push({
                        x: canvas.width / 2,
                        y: canvas.height / 2,
                        vx: (Math.random() - 0.5) * 20,
                        vy: (Math.random() - 0.5) * 20,
                        life: 150,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: Math.random() * 8 + 4
                    });
                }
                const animate = () => {
                    ctx.clearRect(0,0, canvas.width, canvas.height);
                    let active = false;
                    particlesRef.current.forEach((p, i) => {
                        if(p.life > 0) {
                            active = true;
                            p.x += p.vx;
                            p.y += p.vy;
                            p.vy += 0.4; 
                            p.life--;
                            p.size *= 0.96;
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                            ctx.fill();
                        }
                    });
                    if(active) requestAnimationFrame(animate);
                    else ctx.clearRect(0,0, canvas.width, canvas.height);
                };
                animate();
            };
            return [canvasRef, fire];
        };

        // --- Main App ---
        const App = () => {
            // Separate 'allParticipants' for registration/restart vs 'activeParticipants' for the spinning wheel
            const [allParticipants, setAllParticipants] = useState([]);
            const [activeParticipants, setActiveParticipants] = useState([]); 
            
            const [winners, setWinners] = useState([]); 
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [currentPointerName, setCurrentPointerName] = useState('...');
            
            const [spinOrder, setSpinOrder] = useState('forward'); // 'forward' (1st->3rd) or 'reverse' (3rd->1st)
            
            const [fName, setFName] = useState('');
            const [lName, setLName] = useState('');
            
            const canvasRef = useRef(null);
            const [confettiRef, fireConfetti] = useConfetti();

            // Init with some data
            useEffect(() => {
                if(allParticipants.length === 0) addMock(10);
            }, []);

            // Redraw wheel whenever data changes
            useEffect(() => {
                drawWheel();
            }, [activeParticipants, rotation]);

            const addMock = (amount) => {
                const firsts = ["James", "Mary", "Robert", "Patricia", "John", "Jennifer", "Michael", "Linda", "David", "Elizabeth", "William", "Barbara", "Richard", "Susan"];
                const lasts = ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez"];
                
                const newP = [];
                for(let i=0; i<amount; i++) {
                    newP.push({
                        id: Date.now() + i + Math.random(),
                        name: `${firsts[i % firsts.length]} ${lasts[i % lasts.length]} ${i+1}`
                    });
                }
                setAllParticipants(prev => [...prev, ...newP]);
                setActiveParticipants(prev => [...prev, ...newP]);
            };

            const register = (e) => {
                e.preventDefault();
                if(!fName || !lName) return;
                const newPerson = { id: Date.now(), name: `${fName} ${lName}` };
                setAllParticipants(prev => [...prev, newPerson]);
                setActiveParticipants(prev => [...prev, newPerson]);
                setFName(''); setLName('');
            };

            const drawWheel = () => {
                const cvs = canvasRef.current;
                if(!cvs) return;
                const ctx = cvs.getContext('2d');
                const width = cvs.width;
                const height = cvs.height;
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = width / 2;

                ctx.clearRect(0, 0, width, height);

                const colors = ['#e53e3e', '#dd6b20', '#d69e2e', '#38a169', '#3182ce', '#805ad5'];
                const total = activeParticipants.length;
                
                if (total === 0) return; // Nothing to draw

                const arc = (2 * Math.PI) / total;
                const circumference = 2 * Math.PI * radius;
                
                // Font size calculation with a Max Cap (60px) to prevent text being too huge
                const fontSize = Math.min(60, Math.max(8, (circumference / total) * 0.30)); 
                
                ctx.font = `bold ${fontSize}px 'Roboto Mono'`;
                ctx.textBaseline = 'middle';

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate((rotation * Math.PI) / 180);
                ctx.translate(-centerX, -centerY);

                activeParticipants.forEach((p, i) => {
                    const angle = i * arc;

                    // Draw Slice
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, angle, angle + arc);
                    ctx.fillStyle = colors[i % colors.length]; 
                    ctx.fill();
                    ctx.strokeStyle = '#1a202c';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Draw Text
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle + arc / 2);
                    const textMetrics = ctx.measureText(p.name);
                    // Start from edge
                    ctx.translate(radius - 20, 0); 
                    // Point inward
                    ctx.rotate(Math.PI);
                    ctx.textAlign = 'left';
                    ctx.fillStyle = '#fff';
                    ctx.fillText(p.name, 0, 0);
                    ctx.restore();
                });

                // Draw Center Hole (Donut) to hide messy text in the middle
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * 0.15, 0, 2 * Math.PI); // 15% hole
                ctx.fillStyle = '#1a202c'; // Match background
                ctx.fill();

                ctx.restore();
            };

            const spinWheel = () => {
                if (isSpinning || winners.length >= 3) return;
                if (activeParticipants.length < 1) return;

                setIsSpinning(true);

                // Determine rank index based on order
                const rankIndex = spinOrder === 'forward' 
                    ? winners.length 
                    : (2 - winners.length);

                // Pick winner from active pool
                const winnerIndexInPool = Math.floor(Math.random() * activeParticipants.length);
                const winnerObj = activeParticipants[winnerIndexInPool];
                
                // Store the rank on the winner object
                const winnerWithRank = { ...winnerObj, rank: rankIndex };

                const totalSegments = activeParticipants.length;
                const arcDegrees = 360 / totalSegments;
                const sliceCenterAngle = (winnerIndexInPool * arcDegrees) + (arcDegrees / 2);
                
                const spins = 5;
                const k = spins + Math.ceil(rotation / 360); 
                const finalRotation = (270 + (360 * k)) - sliceCenterAngle;
                
                const duration = 20000; 
                const start = performance.now();
                const startRot = rotation;
                
                const animate = (time) => {
                    const elapsed = time - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 5);
                    
                    const currentR = startRot + (finalRotation - startRot) * ease;
                    setRotation(currentR);

                    // Calculate name under pointer
                    const segmentAngle = 360 / totalSegments;
                    const currentDeg = currentR % 360;
                    let angleUnderPointer = (270 - currentDeg + 360) % 360;
                    const indexUnderPointer = Math.floor(angleUnderPointer / segmentAngle);
                    
                    if(activeParticipants[indexUnderPointer]) {
                        setCurrentPointerName(activeParticipants[indexUnderPointer].name);
                    }

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // Spin Done
                        setIsSpinning(false);
                        setWinners(prev => [...prev, winnerWithRank]);
                        fireConfetti();
                        
                        // Remove winner from active wheel pool
                        setActiveParticipants(prev => prev.filter(p => p.id !== winnerObj.id));
                    }
                };
                requestAnimationFrame(animate);
            };

            const restart = () => {
                setWinners([]);
                setRotation(0);
                setCurrentPointerName('...');
                setSpinOrder('forward'); // Reset to default
                // Reset active pool to full pool
                setActiveParticipants([...allParticipants]);
            };

            // Calculate next prize label
            const nextRankIndex = spinOrder === 'forward' 
                ? winners.length 
                : (2 - winners.length);
            
            const nextPrizeLabel = ['1st Place', '2nd Place', '3rd Place'][nextRankIndex];

            // Disable toggle if we have spun at least once
            const isToggleDisabled = winners.length > 0 || isSpinning;

            return (
                <div className="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center">
                    <canvas ref={confettiRef} className="confetti-canvas" />
                    
                    <div className="w-full max-w-[1400px] grid grid-cols-1 xl:grid-cols-[1fr_400px] gap-8">
                        
                        {/* Left: Controls & Wheel */}
                        <div className="flex flex-col gap-6">
                            <div className="bg-gray-800/50 p-6 rounded-2xl backdrop-blur-md border border-gray-700">
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <h1 className="text-2xl font-bold text-yellow-400">Lucky Draw</h1>
                                        <p className="text-sm text-gray-400">
                                            Pool: {activeParticipants.length} | Winners: {winners.length}/3
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => addMock(300)} 
                                        disabled={winners.length > 0} // Disable adding once game starts
                                        className="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-xs text-white px-3 py-2 rounded transition"
                                    >
                                        + Add 300 Users
                                    </button>
                                </div>

                                {/* Order Switcher - Always visible but disabled after start */}
                                <div className={`flex items-center justify-center mb-6 bg-gray-900/50 p-3 rounded-lg border border-gray-700 ${isToggleDisabled ? 'opacity-50' : ''}`}>
                                    <span className={`text-sm font-bold mr-3 transition-colors ${spinOrder === 'reverse' ? 'text-gray-400' : 'text-yellow-400'}`}>3rd ➝ 1st</span>
                                    
                                    <button 
                                        onClick={() => !isToggleDisabled && setSpinOrder(spinOrder === 'forward' ? 'reverse' : 'forward')}
                                        className={`w-14 h-8 rounded-full p-1 transition-colors duration-300 relative toggle-track ${spinOrder === 'reverse' ? 'bg-yellow-500' : 'bg-gray-600'}`}
                                    >
                                        <div className={`bg-white w-6 h-6 rounded-full shadow-md toggle-thumb ${spinOrder === 'reverse' ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                    </button>
                                    
                                    <span className={`text-sm font-bold ml-3 transition-colors ${spinOrder === 'forward' ? 'text-gray-400' : 'text-yellow-400'}`}>1st ➝ 3rd</span>
                                </div>

                                <div className="mb-4 text-center h-12">
                                    <span className="text-gray-400 text-xs uppercase tracking-widest font-bold block mb-1">Current Selection</span>
                                    <span className="font-bold text-yellow-400 text-2xl">
                                        {currentPointerName}
                                    </span>
                                </div>

                                <div className="wheel-wrapper">
                                    <div className="pointer"></div>
                                    <canvas ref={canvasRef} width="900" height="900" />
                                </div>

                                <div className="mt-4 flex flex-col gap-3">
                                    {winners.length < 3 ? (
                                        <button 
                                            onClick={spinWheel}
                                            disabled={isSpinning}
                                            className={`w-full py-4 rounded-xl font-bold text-xl shadow-lg transition transform active:scale-95 ${
                                                isSpinning 
                                                ? 'bg-gray-600 text-gray-400 cursor-not-allowed' 
                                                : 'bg-gradient-to-r from-yellow-400 to-yellow-600 text-black hover:scale-[1.02]'
                                            }`}
                                        >
                                            {isSpinning ? 'Spinning...' : `Spin for ${nextPrizeLabel}`}
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={restart}
                                            className="w-full py-4 rounded-xl font-bold text-xl bg-green-600 text-white hover:bg-green-500 shadow-lg transition transform active:scale-95"
                                        >
                                            Restart Event
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Right: Registration & Results */}
                        <div className="flex flex-col gap-6">
                            
                            {/* Registration */}
                            <div className="bg-gray-800/50 p-6 rounded-2xl backdrop-blur-md border border-gray-700">
                                <h2 className="text-lg font-bold mb-4 text-white">Register Participant</h2>
                                <form onSubmit={register} className="flex gap-2">
                                    <input type="text" placeholder="First" value={fName} onChange={e => setFName(e.target.value)} className="bg-gray-900 border border-gray-600 rounded p-3 text-white w-1/2 focus:border-yellow-400 outline-none" />
                                    <input type="text" placeholder="Last" value={lName} onChange={e => setLName(e.target.value)} className="bg-gray-900 border border-gray-600 rounded p-3 text-white w-1/2 focus:border-yellow-400 outline-none" />
                                    <button type="submit" className="bg-gray-700 hover:bg-gray-600 px-4 rounded text-white font-bold">+</button>
                                </form>
                            </div>

                            {/* Results */}
                            <div className="bg-gray-800/50 p-6 rounded-2xl backdrop-blur-md border border-gray-700 flex-1 min-h-[300px]">
                                <h2 className="text-lg font-bold mb-4 text-yellow-400">Winners</h2>
                                <div className="flex flex-col gap-4">
                                    {winners.length === 0 && (
                                        <div className="text-gray-500 text-center py-10 italic">
                                            Spin wheel to find winners...
                                        </div>
                                    )}
                                    
                                    {/* Sort winners by Rank for clean display */}
                                    {[...winners].sort((a,b) => a.rank - b.rank).map((w, i) => (
                                        <div key={w.id} className="winner-item p-4 rounded flex justify-between items-center">
                                            <div>
                                                <div className="text-xs text-gray-400 uppercase font-bold tracking-widest mb-1">
                                                    {['1st Place', '2nd Place', '3rd Place'][w.rank]}
                                                </div>
                                                <div className="text-xl font-bold text-white font-mono">
                                                    {w.name}
                                                </div>
                                            </div>
                                            <div className="text-2xl">
                                                {w.rank === 0 ? '🥇' : w.rank === 1 ? '🥈' : '🥉'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
