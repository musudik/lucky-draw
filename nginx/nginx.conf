events {
  worker_connections 1024;
}

http {
  # Use Docker's internal DNS resolver — resolves names per-request,
  # not at startup, so NGINX starts even if backend/frontend aren't ready yet.
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    client_max_body_size 10M;

    # API routes → backend
    location /api/ {
      set $backend http://backend:4000;
      proxy_pass         $backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Socket.io — needs WebSocket upgrade
    location /socket.io/ {
      set $backend http://backend:4000;
      proxy_pass         $backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 86400s;
    }

    # Frontend (React SPA)
    location / {
      set $frontend http://frontend:80;
      proxy_pass         $frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
    }
  }
}
