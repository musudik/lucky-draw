services:
  postgres:
    image: postgres:15-alpine
    container_name: luckydb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-luckydb}
      POSTGRES_USER: ${DB_USER:-luckyadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # Exposed publicly so Vercel backend can connect.
      # Protect with a strong DB_PASSWORD — do not leave default.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-luckyadmin} -d ${DB_NAME:-luckydb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    name: lucky_draw_pgdata

